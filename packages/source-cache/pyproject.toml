[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "truewiki-source-cache"
version = "0.1.0"
description = "Source fetching and immutable raw cache package for TrueWiki."
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.27",
  "pydantic>=2.7",
  "typer>=0.12",
]

[tool.setuptools.packages.find]
where = ["src"]
